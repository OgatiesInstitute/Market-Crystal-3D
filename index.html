<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Topology: 1989 vs 2026</title>
    <style>
        body { margin: 0; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); overflow: hidden; color: #fff; font-family: 'Helvetica Neue', Arial, sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 8px; border: 1px solid #444; box-shadow: 0 0 20px rgba(0,212,255,0.2); }
        h1 { margin: 0 0 10px 0; font-size: 18px; letter-spacing: 2px; color: #00d4ff; text-transform: uppercase; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        button { background: #222; color: #fff; border: 1px solid #00d4ff; padding: 10px 20px; cursor: pointer; transition: all 0.3s; border-radius: 4px; font-weight: bold; }
        button:hover { background: #00d4ff; color: #000; box-shadow: 0 0 15px #00d4ff; }
        #desc { font-size: 13px; line-height: 1.6; color: #ccc; max-width: 280px; border-top: 1px solid #333; padding-top: 10px; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 20px; letter-spacing: 5px; color: #00d4ff; }
    </style>
</head>
<body>

    <div id="loading">LOADING TOPOLOGY...</div>

    <div id="ui">
        <h1>Market Topology</h1>
        <div class="btn-group">
            <button onclick="transitionTo('1989')">1989 Mode</button>
            <button onclick="transitionTo('2026')">2026 Mode</button>
        </div>
        <div id="desc">Initializing market structure...</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.rawgit.com/mrdoob/three.js/r128/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls;
        let points = {}; 
        let lines = [];
        let data1989 = [], data2026 = [];
        
        let isTransitioning = false;
        let transitionProgress = 0;
        let currentYear = '2026';

        async function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000);
            camera.position.set(0, 0, 500);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(1, 1, 2);
            scene.add(dirLight);
            scene.add(new THREE.AmbientLight(0x999999));

            try {
                const res1989 = await fetch('./structure_1989_simulated.json?' + Date.now());
                data1989 = await res1989.json();
                const res2026 = await fetch('./structure_2026.json?' + Date.now());
                data2026 = await res2026.json();

                document.getElementById('loading').style.display = 'none';
                
                const allIds = new Set([...data1989.map(d => d.id), ...data2026.map(d => d.id)]);
                const geometry = new THREE.SphereGeometry(8, 32, 32);

                allIds.forEach(id => {
                    const material = new THREE.MeshPhongMaterial({ 
                        color: 0x00d4ff, 
                        emissive: 0x002244,
                        shininess: 100 
                    });
                    const sphere = new THREE.Mesh(geometry, material);
                    scene.add(sphere);

                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.width = 256; canvas.height = 64;
                    context.font = 'Bold 40px Arial';
                    context.fillStyle = 'white';
                    context.textAlign = 'center';
                    context.fillText(id, 128, 45);

                    const texture = new THREE.CanvasTexture(canvas);
                    const spriteMaterial = new THREE.SpriteMaterial({ map: texture });
                    const sprite = new THREE.Sprite(spriteMaterial);
                    sprite.scale.set(40, 10, 1);
                    scene.add(sprite);

                    points[id] = { 
                        sphere: sphere, 
                        label: sprite,
                        startPos: new THREE.Vector3(),
                        endPos: new THREE.Vector3()
                    };
                });

                updateLayout('2026', false);
            } catch (e) {
                console.error("Data Load Error:", e);
            }
            animate();
        }

        window.transitionTo = function(year) {
            if (year === currentYear) return;
            currentYear = year;
            updateLayout(year, true);
        };

        function updateLayout(year, animate) {
            const targetData = (year === '1989') ? data1989 : data2026;
            const targetColor = (year === '1989') ? 0xff4444 : 0x00d4ff;
            const targetEmissive = (year === '1989') ? 0x440000 : 0x002244;

            lines.forEach(line => scene.remove(line));
            lines = [];

            targetData.forEach(item => {
                const node = points[item.id];
                if (node) {
                    node.sphere.visible = true;
                    node.label.visible = true;
                    
                    if (animate) {
                        node.startPos.copy(node.sphere.position);
                        node.endPos.set(item.x, item.y, item.z);
                    } else {
                        node.sphere.position.set(item.x, item.y, item.z);
                        node.label.position.set(item.x, item.y + 15, item.z);
                    }
                    node.sphere.material.color.setHex(targetColor);
                    node.sphere.material.emissive.setHex(targetEmissive);
                }
            });

            if (animate) {
                isTransitioning = true;
                transitionProgress = 0;
            } else {
                drawLines();
            }

            const descText = (year === '1989') ? 
                "【1989】Structural Convergence: A rigid 2D plane driven by cross-shareholdings." : 
                "【2026】Multidimensional Divergence: Autonomous growth in a 3D fundamental space.";
            document.getElementById('desc').innerText = descText;
        }

function drawLines() {
            // 既存の線をクリア
            lines.forEach(line => scene.remove(line));
            lines = [];

            const centerNode = points['Bank'];
            if (!centerNode) return;
            
            const targetData = (currentYear === '1989') ? data1989 : data2026;
            const lineColor = (currentYear === '1989') ? 0xff4444 : 0x00d4ff;
            
            targetData.forEach(item => {
                if (item.id === 'Bank') return;
                const targetNode = points[item.id];
                
                if (targetNode && targetNode.sphere.visible) {
                    // 現在の「見たままの座標」を取得
                    const startPos = centerNode.sphere.position;
                    const endPos = targetNode.sphere.position;
                    const distance = startPos.distanceTo(endPos);
                    
                    // 【ここがポイント】
                    // 1989年は距離が近い（50〜100程度）ので、opacityが高くなる。
                    // 2026年は距離が遠い（300〜500以上）ので、opacityが極めて低くなる。
                    let opacity = 200 / distance; 
                    
                    if (currentYear === '2026') {
                        opacity *= 0.3; // 2026年は意図的にさらに薄くして「解放感」を強調
                    } else {
                        opacity *= 1.2; // 1989年はより「癒着感」を強調
                    }
                    
                    if (opacity > 0.7) opacity = 0.7;
                    if (opacity < 0.02) opacity = 0.02;

                    const lineMaterial = new THREE.LineBasicMaterial({ 
                        color: lineColor, 
                        transparent: true, 
                        opacity: opacity 
                    });

                    const lineGeometry = new THREE.BufferGeometry().setFromPoints([startPos, endPos]);
                    const line = new THREE.Line(lineGeometry, lineMaterial);
                    scene.add(line);
                    lines.push(line);
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if (isTransitioning) {
                transitionProgress += 0.005; // Cinematic slow-motion
                
                if (transitionProgress >= 1) {
                    transitionProgress = 1;
                    isTransitioning = false;
                    drawLines();
                }

                Object.values(points).forEach(node => {
                    if (node.sphere.visible) {
                        node.sphere.position.lerpVectors(node.startPos, node.endPos, transitionProgress);
                        node.label.position.copy(node.sphere.position).y += 15;
                    }
                });
            }

            if (controls) controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
