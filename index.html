<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Topology: 1989 vs 2026</title>
    <style>
        body { margin: 0; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); overflow: hidden; color: #fff; font-family: 'Helvetica Neue', Arial, sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 8px; border: 1px solid #444; box-shadow: 0 0 20px rgba(0,212,255,0.2); }
        h1 { margin: 0 0 10px 0; font-size: 18px; letter-spacing: 2px; color: #00d4ff; text-transform: uppercase; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        button { background: #222; color: #fff; border: 1px solid #00d4ff; padding: 10px 20px; cursor: pointer; transition: all 0.3s; border-radius: 4px; font-weight: bold; }
        button:hover { background: #00d4ff; color: #000; box-shadow: 0 0 15px #00d4ff; }
        #desc { font-size: 13px; line-height: 1.6; color: #ccc; max-width: 280px; border-top: 1px solid #333; pt: 10px; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 20px; letter-spacing: 5px; color: #00d4ff; }
    </style>
</head>
<body>

    <div id="loading">LOADING TOPOLOGY...</div>

    <div id="ui">
        <h1>Market Topology</h1>
        <div class="btn-group">
            <button onclick="transitionTo('1989')">1989 (2D)</button>
            <button onclick="transitionTo('2026')">2026 (3D)</button>
        </div>
        <div id="desc">
            Initializing structure...
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.rawgit.com/mrdoob/three.js/r128/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls;
        let points = {}; 
        let data1989 = [], data2026 = [];

        async function init() {
            // シーン設定
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000);
            camera.position.set(0, 0, 500);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // コントロール設定 (r128形式)
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // ライト
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(1, 1, 2);
            scene.add(dirLight);
            scene.add(new THREE.AmbientLight(0x999999));

            // データ取得
            try {
                // パスを確実に通すために ./ を付与
                const res1989 = await fetch('./structure_1989_simulated.json');
                data1989 = await res1989.json();
                const res2026 = await fetch('./structure_2026.json');
                data2026 = await res2026.json();

                document.getElementById('loading').style.display = 'none';
                createNodes(data2026); // 初回表示
                transitionTo('2026');
            } catch (e) {
                console.error("Data Load Error:", e);
                document.getElementById('loading').innerText = "ERROR LOADING DATA";
            }

            animate();
        }

        function createNodes(data) {
            const geometry = new THREE.SphereGeometry(6, 32, 32);
            data.forEach(item => {
                const material = new THREE.MeshPhongMaterial({ 
                    color: 0x00d4ff, 
                    emissive: 0x002244,
                    shininess: 100 
                });
                const sphere = new THREE.Mesh(geometry, material);
                sphere.position.set(item.x, item.y, item.z);
                scene.add(sphere);
                points[item.id] = sphere;
            });
        }

        function transitionTo(year) {
            const targetData = (year === '1989') ? data1989 : data2026;
            const targetColor = (year === '1989') ? 0xff4444 : 0x00d4ff;
            const targetEmissive = (year === '1989') ? 0x440000 : 0x002244;

            targetData.forEach(item => {
                if (points[item.id]) {
                    // 座標更新
                    points[item.id].position.set(item.x, item.y, item.z);
                    // 色更新
                    points[item.id].material.color.setHex(targetColor);
                    points[item.id].material.emissive.setHex(targetEmissive);
                }
            });

            const descText = (year === '1989') ? 
                "【1989年】株式持ち合いによる強固な相関。全業種が為替と銀行に縛られ、構造は『2D（平面）』へと虚脱しています。" : 
                "【2026年】拘束が解け、各業種が独自のベクトルを獲得。市場は『3D（立体）』のレジリエンスを備えた構造に進化しました。";
            
            document.getElementById('desc').innerText = descText;
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
